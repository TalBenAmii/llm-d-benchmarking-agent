# EPP HTTP-header decoder — turn opaque "some requests failed" into a grounded
# admission/eviction read.
#
# DATA, not code — thin code/thick agent; the rejected-vs-evicted-vs-broken judgment lives
# HERE, never in a Python if/elif. When a benchmark run reports a non-100% success_rate, or a
# harness/report surfaces 429s or an x-llm-d-request-dropped-reason header, the agent loads
# this guide (read_knowledge("epp_headers")) and decodes the signal from the tables below —
# the LLM does the mapping, no Python branch decides "rejected vs evicted vs broken".
#
# The Endpoint Picker (EPP) is the llm-d router component that inspects these HTTP headers to
# do request classification, SLO-aware admission control, and flow control. The set-headers
# below are sent ON THE REQUEST (the client/benchmark sets them); x-llm-d-request-dropped-reason
# is set BY the EPP on the RESPONSE.
#
# Transcribed from upstream llm-d/docs/api-reference/epp-http-headers.md (read it live with
# read_repo_doc path='llm-d/docs/api-reference/epp-http-headers.md' for the source of truth).
# All header lookups are CASE-INSENSITIVE.

source: "llm-d/docs/api-reference/epp-http-headers.md"

# ---------------------------------------------------------------------------
# (1) Request classification + flow-control set-headers. The client/benchmark sets these on
# the REQUEST; the EPP reads them to classify the request, group it for fairness, and target a
# model. These are how a request DECLARES its goals to admission control.
request_headers:
  - name: x-llm-d-inference-objective
    meaning: >-
      Names the InferenceObjective resource for the request. The EPP looks it up in the SAME
      namespace as the InferencePool to apply the defined priority and performance goals. A
      higher-priority objective is what lets one request preempt another (see evicted-priority).
  - name: x-llm-d-inference-fairness-id
    meaning: >-
      A unique identifier used to GROUP requests for fairness-based flow control. Requests
      sharing an ID share capacity under the fairness policy. If omitted, the EPP defaults to
      the group 'default-flow'.
  - name: x-llm-d-model-name-rewrite
    meaning: >-
      An explicit per-request override of the target model name (an alternative to server-side,
      rule-based InferenceModelRewrite). When present the EPP overrides the model name in the
      request body and records model-specific metrics under this name.

# ---------------------------------------------------------------------------
# (2) Service Level Objective (SLO) set-headers. The client/benchmark sets these on the REQUEST;
# admission-control and load-balancing plugins use them to decide whether a request can be
# admitted while still meeting its latency goal. These are the two latency-target SLO headers
# the agent should DECODE when narrating an SLO-aware run.
slo_headers:
  - name: x-llm-d-slo-ttft-ms
    meaning: >-
      Target Time To First Token (TTFT) in milliseconds. Used by plugins to decide if a request
      can be admitted while still meeting the first-token latency goal.
  - name: x-llm-d-slo-tpot-ms
    meaning: >-
      Target Time Per Output Token (TPOT) in milliseconds. Used for admission control based on
      predicted or observed token-generation latency.

# ---------------------------------------------------------------------------
# (3) Deprecated read aliases. llm-d Router v0.9.0+ accepts the previous EPP-managed names as
# deprecated READ aliases. New integrations/examples should use the canonical x-llm-d-* names.
# If BOTH a canonical header and its deprecated alias are sent, the canonical x-llm-d-* value
# wins DETERMINISTICALLY. Lookups are case-insensitive. No removal release/date is announced —
# treat aliases as temporary compatibility support. NB: this rename applies ONLY to
# llm-d/EPP-managed headers; GAIE Endpoint-Picker-Protocol headers (e.g.
# x-gateway-destination-endpoint*) are UNCHANGED.
deprecated_aliases:
  canonical_wins: true          # canonical x-llm-d-* beats the alias deterministically
  case_insensitive: true
  aliases:
    - alias: x-gateway-inference-fairness-id
      canonical: x-llm-d-inference-fairness-id
    - alias: x-gateway-inference-objective
      canonical: x-llm-d-inference-objective
    - alias: x-gateway-model-name-rewrite
      canonical: x-llm-d-model-name-rewrite
    - alias: x-slo-ttft-ms
      canonical: x-llm-d-slo-ttft-ms
    - alias: x-slo-tpot-ms
      canonical: x-llm-d-slo-tpot-ms

# ---------------------------------------------------------------------------
# (4) Response headers the EPP sets. THE KEY ONE for reading failures.
response_headers:
  - name: x-llm-d-request-dropped-reason
    meaning: >-
      Indicates WHY a request was dropped by flow control. ONLY present on 429 responses
      GENERATED BY THE EPP (not forwarded from a model server). So a 429 carrying this header is
      a deliberate admission/eviction decision, NOT a crash or a broken stack.
    prefix_scheme:
      rejected: >-
        The request NEVER reached an inference server — no inference work was done, so it is
        CHEAP to retry (retry promptly / at lower concurrency).
      evicted: >-
        The request WAS dispatched and then killed — GPU cycles were already spent, so factor
        this into backoff (it is NOT free to retry).

# ---------------------------------------------------------------------------
# (5) The x-llm-d-request-dropped-reason enum -> plain-language cause + remedy.
# THIS is the rejected-vs-evicted-vs-broken JUDGMENT store. capacity_not_breakage: true on
# every value means: a run that hit these is a SATURATION/EVICTION signal (the system protecting
# itself at capacity), NOT a failing/broken stack. The agent maps the enum value to its cause
# and remedy from here — no Python decides this.
dropped_reason_enum:
  rejected-saturated:
    prefix: rejected
    capacity_not_breakage: true
    cause: >-
      System at admission capacity — the request was rejected BEFORE it was even queued (shed
      at the door). The stack is full, not broken.
    remedy: >-
      Lower the offered load (reduce concurrency / request rate) or scale out (add replicas /
      capacity). A burst of these means you found the admission ceiling.
  rejected-ttl-expired:
    prefix: rejected
    capacity_not_breakage: true
    cause: >-
      The request entered the queue but its TTL expired before it could be dispatched — it
      waited too long under load and was dropped.
    remedy: >-
      Reduce queue pressure (lower concurrency) or add capacity so the queue drains within the
      TTL; consider a longer TTL only if the latency budget allows.
  rejected-context-cancelled:
    prefix: rejected
    capacity_not_breakage: true
    cause: >-
      The CLIENT disconnected while the request was still queued (the request was abandoned,
      not refused by the server).
    remedy: >-
      A client-side timeout/cancellation — usually the benchmark's own timeout firing while
      requests waited under load. Raise the client timeout, or lower concurrency so requests
      are served before the client gives up. Not a server fault.
  evicted:
    prefix: evicted
    capacity_not_breakage: true
    cause: >-
      Generic post-dispatch eviction — the request was dispatched then killed by flow control.
      GPU cycles were already spent.
    remedy: >-
      Reduce load or add capacity; because work was already done, back off before retrying.
  evicted-queue-pressure:
    prefix: evicted
    capacity_not_breakage: true
    cause: >-
      Evicted AFTER dispatch due to backpressure from newly arriving requests — the stack
      preempted in-flight work to relieve a surge.
    remedy: >-
      Smooth the arrival rate / lower concurrency, or add capacity so bursts don't force
      in-flight evictions. Back off before retrying (cycles were spent).
  evicted-priority:
    prefix: evicted
    capacity_not_breakage: true
    cause: >-
      Preempted MID-FLIGHT by a HIGHER-PRIORITY request — the request was dispatched, then
      killed so a more important objective could run. This is the priority system working, not
      a failure.
    remedy: >-
      Raise THIS request's priority via its x-llm-d-inference-objective (a higher-priority
      InferenceObjective), or add capacity so high- and low-priority work both fit. Back off
      before retrying (cycles were spent).

# ---------------------------------------------------------------------------
# (6) How to narrate a failure fraction (prose for the agent).
narration: >-
  When a run shows a non-100% success_rate, or a harness/report surfaces 429s or an
  x-llm-d-request-dropped-reason header, do NOT call the system "broken" or say "some requests
  failed." An EPP-generated 429 with a drop reason is the router DELIBERATELY shedding or
  preempting load at capacity. Reframe the failure fraction as an ADMISSION/EVICTION signal:
  e.g. a 7%-failure run with rejected-saturated reads as "7% of requests were rejected at
  admission capacity — the stack hit its ceiling and shed them before serving, not failing.
  Lower the concurrency or scale out." Decode rejected-* as "never reached a server, cheap to
  retry" and evicted-* as "dispatched then preempted, GPU cycles spent — factor into backoff."
  Also decode the SLO set-headers when present: x-llm-d-slo-ttft-ms / x-llm-d-slo-tpot-ms are
  the latency TARGETS admission control enforced, and x-llm-d-inference-objective /
  x-llm-d-inference-fairness-id are the priority/fairness class the request ran under — which is
  exactly what determines whether it could be preempted (evicted-priority). If the report
  carries NO drop-reason header (e.g. the CPU-sim quickstart, which sheds nothing), say nothing
  about EPP drops rather than guessing.
