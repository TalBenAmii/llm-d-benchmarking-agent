# Infrastructure precondition gate — go/no-go thresholds (DATA, not Python)
#
# This is the JUDGMENT table for the `cluster_preconditions` check of `probe_environment`.
# The probe is pure mechanism: it reports the FACTS (the cluster's K8s server major.minor and
# the chosen spec's pinned image tags). ALL the version-comparison and verdict logic lives
# HERE, as data the LLM reasons over — there is NO if/elif threshold check in app/.
#
# Why this matters: on a real cluster a sidecar-based prefill/decode (P/D) guide quietly gets
# stuck in `Init:0/1` for minutes into a long standup before failing, because sidecar init
# containers (restartPolicy: Always) need recent Kubernetes. Reading these facts UP FRONT turns
# that opaque post-standup stall into an honest go/no-go: "on K8s 1.27 the sidecar P/D guide
# won't init — upgrade to 1.33+ or pick a non-sidecar path."
#
# Source of truth: llm-d/docs/infrastructure.md ("Supported infrastructure" / vLLM image
# section). Re-read it (fetch_key_docs / read_repo_doc) if you need the latest wording.

source: "llm-d/docs/infrastructure.md"

# ---------------------------------------------------------------------------
# Kubernetes server version thresholds (compare against cluster_preconditions.server_version)
# ---------------------------------------------------------------------------
kubernetes:
  # The hard minimum llm-d supports at all.
  minimum: "1.29"
  # Recommended for COMPLETE sidecar init-container support (restartPolicy: Always), which the
  # P/D / sidecar-based guides rely on.
  recommended_for_sidecars: "1.33"
  # At or below this, sidecar init containers are incompletely supported: pods may hang in
  # Init:0/1. This is the headline gotcha.
  sidecar_init_stall_at_or_below: "1.28"

  # The verdict bands the agent reports. major.minor is what the probe extracts; compare it
  # against the bands below (the probe strips a trailing '+' like GKE's "29+").
  verdicts:
    - when: "server major.minor <= 1.28"
      example: "1.27"
      sidecar_path: "no-go"
      verdict: >-
        The sidecar-based P/D guide will get stuck in Init:0/1 on this cluster — sidecar init
        containers are incompletely supported at or below K8s 1.28. Upgrade the cluster to
        1.33+ (recommended) — or, if you can't upgrade, pick a NON-sidecar deployment path
        (e.g. cicd/kind / optimized-baseline, which don't depend on sidecar init containers).
    - when: "1.29 <= server major.minor < 1.33"
      example: "1.29"
      sidecar_path: "runs-with-caveat"
      verdict: >-
        Runs — this clears the 1.29 minimum. But 1.33+ is recommended for COMPLETE sidecar init
        container support; on 1.29-1.32 a sidecar-heavy P/D guide may be flaky. Green for
        non-sidecar paths; for a sidecar P/D guide, say it should work but recommend 1.33+.
    - when: "server major.minor >= 1.33"
      example: "1.33"
      sidecar_path: "go"
      verdict: >-
        Green. This meets the recommended 1.33+ for full sidecar init-container support; the
        sidecar-based P/D guides are supported.
    - when: "server_version is null (no reachable cluster / --client-only output)"
      sidecar_path: "unknown"
      verdict: >-
        Could not read the K8s server version (no reachable cluster yet, or kubectl returned
        client-only output). Don't claim a verdict — re-probe once the cluster is up, BEFORE
        committing to a long standup on a sidecar path.

# ---------------------------------------------------------------------------
# vLLM image library minimums (compare against cluster_preconditions.image_tags)
# ---------------------------------------------------------------------------
# The llm-d guides are tested with a vLLM image that bundles these library versions. A spec's
# image tag at or above the minimum is fine; below it is FLAGGED (below tested minimums — the
# guide may misbehave). Tags use semver-ish strings (e.g. "v0.10.0", "0.10.0", "latest"); a
# "latest"/non-numeric tag is UNKNOWN, not a pass — say you can't verify it.
image_minimums:
  vllm: "0.10.0"
  nixl: "0.5.0"
  ucx: "0.19.0"
  nvshmem: "3.3.9"

image_tag_notes: >-
  cluster_preconditions.image_tags lists every {name, repository, tag, path} pinned in the
  spec's scenario YAML (e.g. images.vllm, standalone.image). Match each by its repository/name
  to the minimum above and compare the numeric part of the tag. NOTE: the bundled Kind/CPU-sim
  path pins the llm-d-inference-SIM image (ghcr.io/llm-d/llm-d-inference-sim, e.g. v0.8.2) — that
  is the SIMULATOR, not the real vLLM serving image, so the vLLM 0.10.0 minimum does not apply to
  it; it's a stand-in that doesn't run real inference. The vLLM/NIXL/UCX/NVSHMEM minimums bite on
  a REAL serving image (a GPU/P-D guide), not the sim. When a tag is missing, "latest", or
  non-numeric, report it as unverifiable rather than passing it.

# ---------------------------------------------------------------------------
# Scope — when this gate actually bites
# ---------------------------------------------------------------------------
applicability: >-
  This is ADVISORY for the Kind / CPU-sim MVP (a freshly-created Kind cluster runs a modern
  Kubernetes, and the path uses the sim image, not real vLLM) — it almost never blocks there.
  It MATTERS on a real cluster (an existing managed/on-prem K8s the user points us at) before a
  long real-cluster standup, especially a sidecar-based P/D guide. Run the cluster_preconditions
  check with the planned spec BEFORE that standup and report the verdict up front, so the user
  hears the go/no-go instead of a baffling Init:0/1 stall after the standup burned real time.
