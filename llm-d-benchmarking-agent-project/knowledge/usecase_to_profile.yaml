# Heuristics mapping a user's described use case to harness/workload hints.
# This is ADVISORY DATA for the agent, not executable logic. Always confirm the actual
# names against the live catalog (list_catalog) before using them — profiles vary per
# harness and the repo is the source of truth.

# MVP constraint: the only fully supported deploy path is `cicd/kind` (CPU sim).
# On the quickstart / kind_sim path ALWAYS use inference-perf + sanity_random.yaml, whatever
# the use case — and do NOT present the candidate_workloads below as a choice to the user.
# `sanity_random.yaml` is the upstream quickstart default, and the CPU sim makes the profile
# choice largely cosmetic, so asking a non-expert to pick is just noise. The use_cases
# candidate_workloads below apply ONLY to GPU/guide deploys; reach for them once those paths
# are supported. (Honor an explicit user request for a specific workload either way.)

use_cases:
  chat:
    description: Interactive chat / assistant; users care about responsiveness (TTFT, ITL).
    prefer_harness: inference-perf
    candidate_workloads: [chatbot_synthetic.yaml, chatbot_sharegpt.yaml, shared_prefix_synthetic.yaml]
    emphasize_metrics: [ttft, itl, request_latency]

  code_completion:
    description: IDE/code completion; short prompts, latency-sensitive.
    prefer_harness: inference-perf
    candidate_workloads: [code_completion_synthetic.yaml]
    emphasize_metrics: [ttft, tpot]

  rag_long_context:
    description: Retrieval-augmented, long shared prefixes; benefits from prefix caching.
    prefer_harness: inference-perf
    candidate_workloads: [shared_prefix_synthetic.yaml, shared_prefix_multi_turn_chat.yaml]
    emphasize_metrics: [ttft, total_token_rate]

  summarization_batch:
    description: Long inputs, throughput-oriented, latency-tolerant.
    prefer_harness: inference-perf
    candidate_workloads: [summarization_synthetic.yaml]
    emphasize_metrics: [output_token_rate, total_token_rate]

  throughput_discovery:
    description: "Find max sustainable throughput / sweep load (incl. bursty / autoscaling)."
    prefer_harness: guidellm
    candidate_workloads: [shared_prefix_synthetic.yaml, chatbot_synthetic.yaml, guide_workload-autoscaling_1.yaml]
    emphasize_metrics: [total_token_rate, request_rate]

  smoke_or_sanity:
    description: Quick correctness/plumbing check (the quickstart default).
    prefer_harness: inference-perf
    candidate_workloads: [sanity_random.yaml]
    emphasize_metrics: [success_rate_pct, ttft]

  agentic:
    description: Long multi-turn, tool-using agentic programs; huge shared/system prefix,
      deep sessions, bursty arrivals — cache hit rate (not FLOPs) sets throughput.
    prefer_harness: inference-perf
    candidate_workloads: [agentic_code_generation.yaml, otel_traces.yaml]
    emphasize_metrics: [ttft, total_token_rate, request_latency]

  multimodal:
    description: Image+text (multimodal) serving — text+image chat with multimodal
      prefix-/load-aware routing.
    prefer_harness: inference-perf
    candidate_workloads: [guide_multimodal-serving_1.yaml]
    emphasize_metrics: [ttft, request_latency, total_token_rate]

# Translating scale words to load shape (advisory; the workload profile defines actual rates):
concurrency_hints:
  "a few users": low constant rate
  "hundreds of concurrent users": higher constant rate or a staged ramp
  "spiky / bursty": a staged/ramp profile rather than constant

# ENGAGE a concrete user number ("~500 concurrent users") — don't ignore it. Stock workload
# ladders top out FAR below hundreds, so a stock profile silently under-tests at that scale.
# Map the number to the load config with an explicit override (this is judgment the user asked for):
#   * inference-perf conversation_replay (concurrent): set concurrency_level = N, then size the run
#     num_requests = N × turns × num_rounds. (Think-time users still count against N — it does NOT
#     free a slot.)
#   * constant/poisson synthetic: ensure num_workers × worker_max_concurrency ≥ N; for rate-based
#     load, target rate ≈ N / mean_request_latency (Little's Law), NOT rate = N.
# The exact knobs + verified semantics live in read_knowledge('dataset_replay') (conversation_replay
# load semantics); confirm profile defaults against list_catalog before quoting a ladder.
