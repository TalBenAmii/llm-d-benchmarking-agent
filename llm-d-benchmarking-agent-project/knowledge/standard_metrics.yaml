# §3.4 "standard metrics" field catalog — DATA, not code (thin code / thick agent).
#
# The proposal's Results Analyzer lists KV-cache hit rate, schedule delay, and GPU
# utilization among the "standard metrics" to surface. Unlike the request-level
# latency/throughput numbers (which live at fixed paths in the Benchmark Report v0.2
# aggregate), these are *resource/serving* metrics that a harness MAY or may not emit,
# and a given harness can carry them under EITHER:
#
#   1. the BR v0.2 STANDARDIZED ResourceMetrics object, at
#        results.observability.components[].aggregate.<field>
#      (a Statistics object: {units, mean, min, p50, p90, p99, max, ...}); or
#   2. a HARNESS-NATIVE per-metric entry directly under results.observability.<key>
#      (shape: {components:[{statistics:{...}}], aggregated:{...}} — a per-pod /
#      cluster-wide stats dict keyed by a vendor metric name, e.g. vLLM / EPP).
#
# This file maps each surfaced metric to the candidate field names IN PREFERENCE
# ORDER (most-standard first). app/validation/report.py reads this catalog at runtime
# and MECHANICALLY extracts the first candidate that is present — it embeds no metric
# knowledge of its own. To teach the analyzer a new harness's field name, add it here;
# no code change. NEVER fabricate a value: a metric absent from the report stays None.
#
# `direction` is informational only (better = higher/lower); it lets the analyzer treat
# kv-cache hit rate as an OPTIONAL informational Pareto objective without changing the
# goodput/SLO objectives. `unit_hint` is the unit these are normally reported in.

metrics:
  # ---- KV-cache hit rate -------------------------------------------------
  # The fraction of requested prefix tokens served from cache. Higher is better
  # (more reuse => less recompute => lower TTFT / higher throughput). Reported as a
  # percentage. NOTE: kv_cache_usage / *_cache_usage is OCCUPANCY, not HIT RATE — do
  # not conflate; only true hit-rate fields belong here.
  kv_cache_hit_rate:
    label: KV-cache hit rate
    direction: higher
    unit_hint: percent
    # 1) BR v0.2 standardized ResourceMetrics field.
    standardized: [cache_hit_rate]
    # 2) Harness-native observability keys (vLLM prefix-cache hit rate, internal/external).
    native: [vllm_prefix_cache_hit_rate, vllm_external_prefix_cache_hit_rate]

  # ---- Schedule delay ----------------------------------------------------
  # How long requests wait to be scheduled onto the engine — the queueing/admission
  # delay the scheduler introduces under load. BR v0.2 has NO standardized scalar
  # "schedule_delay"; the faithful proxy is queue depth (requests waiting to be
  # scheduled) from the standardized ResourceMetrics.waiting_requests, or the
  # harness-native scheduler queue gauges (vLLM num_requests_waiting / the llm-d
  # inference-scheduler EPP pool average queue size). Lower is better. Surfaced as a
  # proxy and LABELLED as such — we never invent a millisecond delay the report lacks.
  schedule_delay:
    label: schedule delay (queue depth proxy)
    direction: lower
    unit_hint: count
    proxy: true
    standardized: [waiting_requests]
    native: [vllm_num_requests_waiting, epp_pool_avg_queue_size]

  # ---- GPU utilization ---------------------------------------------------
  # GPU compute utilization (%). High utilization => the accelerator is the bottleneck
  # (good capacity, little headroom); low => something else (queueing, CPU, network)
  # is gating, or the load is too light to saturate the GPU. Higher is "more utilized"
  # but not unconditionally "better" — direction is informational only.
  gpu_utilization:
    label: GPU utilization
    direction: higher
    unit_hint: percent
    standardized: [gpu_utilization]
    # GPU COMPUTE utilization is DCGM-exporter-only: vLLM exposes cache/memory occupancy
    # and queue gauges, NOT a compute-utilization metric (there is no real vllm_gpu_utilization
    # key). Without a DCGM exporter scraped into the report this metric stays None.
    native: [dcgm_gpu_utilization, DCGM_FI_DEV_GPU_UTIL]

# ---- NOTE on `native:` keys ---------------------------------------------------
# The `native:` candidates are the BR report's TOP-LEVEL observability KEY names
# (results.observability.<key>) as emitted by the harness — NOT the raw vLLM Prometheus
# metric names (which are colon-prefixed, e.g. vllm:prefix_cache_hit_rate /
# vllm:kv_cache_usage_perc / vllm:num_requests_waiting). report.py reads observability.get(key)
# by EXACT string, so the underscore keys above are what match a real report. A colon-form
# may be APPENDED as an additional candidate for robustness, but never replace the underscore keys.

  # ---- KV-cache usage (occupancy) and preemptions — NOT catalogued here ----
  # The BR v0.2 ResourceMetrics object DOES carry `kv_cache_usage` (occupancy) and
  # `preemptions` (and the real BR example surfaces both, plus the native
  # vllm_kv_cache_usage_perc / vllm_num_preemptions_total keys). They are deliberately
  # NOT added as catalog entries above: extract_standard_metrics intentionally surfaces
  # only the three §3.4 "standard metrics" (kv_cache_hit_rate, schedule_delay,
  # gpu_utilization) — widening that set is a code/contract change, not a knowledge edit.
  # Read them DIRECTLY off the report when diagnosing memory pressure:
  #   * kv_cache_usage = OCCUPANCY (cache fill), DISTINCT from kv_cache_hit_rate (reuse).
  #     >90% (~0.9) => cache near-full => preemption / request-rejection risk
  #     (per llm-d/docs/operations/observability/metrics.md, vllm:kv_cache_usage_perc).
  #   * preemptions = in-flight requests the engine evicted+re-queued under memory pressure
  #     (lower is better; native key vllm_num_preemptions_total) — a direct KV-exhaustion symptom.

  # ---- GPU power consumption ---------------------------------------------
  # GPU power draw (Watts), typically from the DCGM exporter — a cost/efficiency signal.
  # Informational (direction none). Standardized field name exact per the BR v0.2
  # ResourceMetrics schema; absent => None, never fabricated.
  power_consumption:
    label: GPU power
    direction: none
    unit_hint: Watts
    standardized: [power_consumption]
    native: [dcgm_power_usage, DCGM_FI_DEV_POWER_USAGE]


# ---- session-level metrics (multi-turn workloads) ------------------------ DATA, not code.
#
# Multi-turn inference-perf workloads (where one "session" = a sequence of related
# requests/turns, e.g. a chat conversation) emit a SECOND results block alongside the
# per-request request_performance: results.session_performance.sessions. It is populated
# only for multi-turn runs (from the harness's *_session_lifecycle_metrics.json files);
# single-turn / non-session runs OMIT the block entirely. app/validation/report.py reads
# THIS catalog at runtime and mechanically pulls each named field that is present — it
# embeds no session-metric knowledge of its own. A field absent from the report stays out
# of the summary; NEVER fabricate one.
#
# IMPORTANT — the committed br_v0_2_json_schema.json LAGS the pydantic models and does NOT
# yet declare session_performance (Results has additionalProperties:false), so a multi-turn
# report surfaces it as a NON-FATAL additionalProperties DEVIATION under validate_report
# (the report is newer than the pinned schema). Validation still passes; the numbers are
# real. Teaching the extractor a renamed/new session field is a one-line edit here — no
# code change.
#
# Two field families (the field names are the EXACT keys under sessions.*):
#   * scalars      — plain integer counts, copied straight through.
#   * distributions— Statistics objects ({units, mean, percentiles}); each carries an
#     informational `label`/`unit_hint`/`direction` (better = higher/lower/none) used only
#     for narration, never for any pass/fail or dominance decision.

session_performance:
  scalars:
    - total                       # total sessions
    - succeeded                   # sessions that completed successfully
    - failed                      # sessions that failed
    - total_events                # total events (requests/turns) across all sessions
    - total_events_completed      # events that completed successfully
    - total_events_cancelled      # events that were cancelled

  distributions:
    # session throughput — how many sessions completed per second. Higher = more
    # conversational capacity. Units per the BR v0.2 SessionRequests model: queries/s.
    session_rate:
      label: session rate
      unit_hint: queries/s
      direction: higher
    # wall-clock duration of a whole session (all its turns). Lower = snappier
    # multi-turn experience; watch the tail (p90/p99) for slow conversations.
    session_duration:
      label: session duration
      unit_hint: s
      direction: lower
    # how many events (turns/requests) each session contained — workload shape, not
    # a quality signal; direction is none (neither higher nor lower is "better").
    events_per_session:
      label: events per session
      unit_hint: count
      direction: none
    # how many events per session were cancelled — lower is better (fewer dropped
    # turns means a healthier multi-turn run).
    events_cancelled_per_session:
      label: events cancelled per session
      unit_hint: count
      direction: lower
    # total input (prompt) tokens consumed per session — cost/context-size shape;
    # direction none (it reflects the workload, not run quality).
    input_tokens_per_session:
      label: input tokens per session
      unit_hint: count
      direction: none
    # total output (generated) tokens produced per session — workload shape;
    # direction none.
    output_tokens_per_session:
      label: output tokens per session
      unit_hint: count
      direction: none
