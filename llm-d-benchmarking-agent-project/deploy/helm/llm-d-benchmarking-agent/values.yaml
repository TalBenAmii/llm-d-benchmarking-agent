# Default values for the llm-d-benchmarking-agent chart.
# Override with `helm install ... -f my-values.yaml` or `--set key=value`.

# --- container image --------------------------------------------------------------------
# IMAGE PINNING: prefer pinning by digest (image.digest) over a mutable tag in production so
# every rollout is reproducible. If digest is set it wins over tag.
image:
  repository: ghcr.io/llm-d/llm-d-benchmarking-agent
  tag: "0.1.0"
  digest: ""            # e.g. sha256:abc... — when set, the Deployment uses repository@digest
  pullPolicy: IfNotPresent
imagePullSecrets: []

# How many agent replicas. The agent keeps in-memory per-session state, so >1 replica needs a
# sticky/affinity ingress (out of scope here); default to a single replica.
replicaCount: 1

# --- the agent's own config (non-secret) — surfaced as env on the container ---------------
config:
  # Default: the Claude Agent SDK, authenticated by a Claude subscription (Max/Pro) via a
  # CLAUDE_CODE_OAUTH_TOKEN (from `claude setup-token`) delivered as secret.claudeCodeOauthToken.
  # API-key fallback: set llmProvider=anthropic + secret.anthropicApiKey for metered API billing.
  llmProvider: claude-agent-sdk
  agentSdkModel: claude-sonnet-5
  agentSdkEffort: high         # low | medium | high | xhigh | max
  agentSdkThinking: adaptive   # adaptive | <budget_tokens> | off
  anthropicModel: claude-opus-4-8
  maxConcurrentRuns: 2
  # Container image used for ORCHESTRATED (K8s Job) benchmark runs. Leave empty to use the
  # in-Pod local-CLI path (default) — the agent runs llmdbenchmark inside its own Pod and the
  # orchestrate_benchmark_run tool refuses rather than submitting an unrunnable Job. Set to this
  # chart's image ref to enable orchestrated K8s-Job runs — the baked image carries llmdbenchmark
  # on PATH. Future deployment option.
  orchestratorImage: ""

# --- secrets ----------------------------------------------------------------------------
# By default the chart creates a Secret from the values below. To use a pre-existing Secret
# instead (recommended for real deployments), set secret.create=false and secret.existingSecret
# to its name; it must contain the same keys (CLAUDE_CODE_OAUTH_TOKEN / ANTHROPIC_API_KEY /
# HF_TOKEN).
secret:
  create: true
  existingSecret: ""
  claudeCodeOauthToken: ""   # `claude setup-token` — primary auth for the claude-agent-sdk default
  anthropicApiKey: ""
  hfToken: ""

# --- RBAC / ServiceAccount --------------------------------------------------------------
# The agent orchestrates benchmark runs as Kubernetes Jobs. rbac.create grants a namespaced
# Role with EXACTLY the least-privilege verbs the orchestrator uses (jobs: create/get/list/
# watch/patch/delete; pods: get/list/watch; pods/log: get) — nothing cluster-wide.
serviceAccount:
  create: true
  name: ""              # defaults to the release fullname
rbac:
  create: true

# --- namespace Pod Security admission ---------------------------------------------------
# The Baseline Pod Security Standard levels install_service.sh stamps on the deploy namespace, so a
# mistaken/crafted Job (the agent's SA can create Jobs) can't mount a hostPath and reach the node —
# see docs/guides/CLUSTER_SERVICE_DEPLOY.md §Security model for why Baseline (not Restricted). NOTE:
# the chart does NOT template a Namespace object and does not read these keys at render time — the
# installer applies the labels, and tests/platform/test_packaging.py asserts it uses this exact
# `enforce` value so the two can't silently diverge. A chart-only `helm` deploy must label the
# namespace itself: kubectl label ns <ns> pod-security.kubernetes.io/enforce=baseline --overwrite.
podSecurity:
  enforce: baseline   # blocks non-conforming pods at admission
  warn: baseline      # surfaces violations to the API caller
  audit: baseline     # records violations in the audit log

# --- networking -------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 8000

# --- pod / container hardening ----------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1"
    memory: "512Mi"

# --- writable workspace volume ----------------------------------------------------------
# The root filesystem is read-only, so the agent writes to two mounted volumes: /workspace
# (per-session state, generated configs, logs) and /tmp. Both are bounded emptyDirs by default.
workspace:
  # Writable scratch for per-session state, generated configs, logs. Ephemeral by default
  # (emptyDir) — sessions do NOT survive a pod restart. Flip persistence.enabled for a PVC.
  sizeLimit: 2Gi        # cap on the /workspace emptyDir (and default PVC size)
  tmpSizeLimit: 1Gi     # cap on the /tmp emptyDir (always ephemeral — never persisted)
  persistence:
    enabled: false
    storageClass: ""    # "" = cluster default StorageClass
    size: 5Gi
    accessMode: ReadWriteOnce

# --- observability ----------------------------------------------------------------------
# When true, annotate the pod for Prometheus scraping of the agent's /metrics endpoint.
metrics:
  podAnnotations: true

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
