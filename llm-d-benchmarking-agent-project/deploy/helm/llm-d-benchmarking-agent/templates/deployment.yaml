apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent.fullname" . }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agent.selectorLabels" . | nindent 8 }}
      annotations:
        {{- if .Values.metrics.podAnnotations }}
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        # Pod-discovery scrapes the POD IP, so this must be the CONTAINER port (8000, see
        # containerPort/PORT below), NOT service.port — else `--set service.port=8080` would point
        # the scrape at a port nothing listens on.
        prometheus.io/port: "8000"
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "agent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent
          image: {{ include "agent.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8000"
            - name: LLM_PROVIDER
              value: {{ .Values.config.llmProvider | quote }}
            - name: ANTHROPIC_MODEL
              value: {{ .Values.config.anthropicModel | quote }}
            - name: OPENAI_BASE_URL
              value: {{ .Values.config.openaiBaseUrl | quote }}
            - name: OPENAI_MODEL
              value: {{ .Values.config.openaiModel | quote }}
            - name: MAX_CONCURRENT_RUNS
              value: {{ .Values.config.maxConcurrentRuns | quote }}
            - name: ORCHESTRATOR_IMAGE
              value: {{ .Values.config.orchestratorImage | quote }}
            # Writable scratch (root FS is read-only); keep session state off the image layer.
            - name: WORKSPACE_DIR
              value: /workspace
            # Secrets — sourced from the chart-managed or pre-existing Secret, never inlined here.
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "agent.secretName" . }}
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "agent.secretName" . }}
                  key: OPENAI_API_KEY
                  optional: true
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "agent.secretName" . }}
                  key: HF_TOKEN
                  optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: tmp
              mountPath: /tmp
      volumes:
        # readOnlyRootFilesystem is on, so the writable paths the app needs are emptyDir.
        - name: workspace
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
