{{- if .Values.rbac.create -}}
# Least-privilege, NAMESPACED RBAC for the agent's orchestrator. These verbs are EXACTLY what
# app/orchestrator/kube.py (RealKubeClient) runs via kubectl — apply/get/list/watch/patch/
# delete Jobs, get/list/watch Pods, read Pod logs, and get/list/watch + create/patch the per-sweep
# checkpoint ConfigMap (Phase 22 DOE sweep resume — the agent's OWN managed-by ConfigMaps, never
# Secrets) — and nothing more. No ClusterRole, no access to Secrets/Roles in this namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "agent.fullname" . }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Sweep checkpoint/resume: CheckpointStore reads (kubectl get configmaps -l) and writes
  # (kubectl apply = create-or-update) one managed-by ConfigMap per sweep_id. No delete.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "agent.fullname" . }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "agent.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end -}}
