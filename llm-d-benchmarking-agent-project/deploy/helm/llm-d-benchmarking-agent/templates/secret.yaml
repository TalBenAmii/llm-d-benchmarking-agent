{{- if and .Values.secret.create (not .Values.secret.existingSecret) -}}
# API keys / tokens for the agent. NEVER committed — populate via -f values or --set, or set
# secret.create=false and point secret.existingSecret at a Secret you manage out-of-band.
# These are surfaced to the container as env (see deployment.yaml) and never reach the browser.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agent.fullname" . }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  CLAUDE_CODE_OAUTH_TOKEN: {{ .Values.secret.claudeCodeOauthToken | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secret.anthropicApiKey | quote }}
  OPENAI_API_KEY: {{ .Values.secret.openaiApiKey | quote }}
  HF_TOKEN: {{ .Values.secret.hfToken | quote }}
{{- end -}}
