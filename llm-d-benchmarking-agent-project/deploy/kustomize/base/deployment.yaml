apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-d-benchmarking-agent
  labels:
    app.kubernetes.io/name: llm-d-benchmarking-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-d-benchmarking-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-d-benchmarking-agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: llm-d-benchmarking-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          # Overlays / `kustomize edit set image` pin this to a specific tag or digest.
          image: ghcr.io/llm-d/llm-d-benchmarking-agent:0.1.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8000"
            - name: WORKSPACE_DIR
              value: /workspace
            - name: ORCHESTRATOR_IMAGE
              value: ""
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-d-benchmarking-agent
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-d-benchmarking-agent
                  key: OPENAI_API_KEY
                  optional: true
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: llm-d-benchmarking-agent
                  key: HF_TOKEN
                  optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: workspace
          emptyDir: {}
        - name: tmp
          emptyDir: {}
