# Least-privilege, NAMESPACED RBAC for the agent's orchestrator. These verbs are EXACTLY what
# app/orchestrator/kube.py (RealKubeClient) runs via kubectl, and nothing more. Kept in lockstep
# with the Helm chart's templates/rbac.yaml (tests assert both match the app's RBAC contract).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: llm-d-benchmarking-agent
  labels:
    app.kubernetes.io/name: llm-d-benchmarking-agent
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Sweep checkpoint/resume: CheckpointStore reads (kubectl get configmaps -l) and writes
  # (kubectl apply = create-or-update) one managed-by ConfigMap per sweep_id. No delete.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: llm-d-benchmarking-agent
  labels:
    app.kubernetes.io/name: llm-d-benchmarking-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: llm-d-benchmarking-agent
subjects:
  - kind: ServiceAccount
    name: llm-d-benchmarking-agent
