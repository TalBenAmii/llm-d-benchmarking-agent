# CI for the llm-d benchmarking agent: prove the agent drives the RIGHT COMMANDS for each
# end-to-end flow (kind quickstart, optimized-baseline, teardown, …).
#
# The gating job is fully HERMETIC: the flow harness replays each flow's golden transcript
# through the real agent loop + real allowlist + real approval gating, capturing the
# commands without spawning anything — so it needs no API key, no Docker, no kind, and not
# even the llm-d / llm-d-benchmark repos checked out. Fast and deterministic.
#
# A second, OPT-IN job runs the *live* eval (a real LLM drives each flow from mock input).
# It only runs on manual dispatch and never blocks: it needs an API-key secret and is
# nondeterministic by nature.
name: agent-flow-validation

on:
  push:
    paths:
      - "llm-d-benchmarking-agent-project/**"
      - ".github/workflows/agent-flow-validation.yml"
  pull_request:
    paths:
      - "llm-d-benchmarking-agent-project/**"
      - ".github/workflows/agent-flow-validation.yml"
  workflow_dispatch:
    inputs:
      run_live_eval:
        description: "Also run the live LLM eval (needs LLM_API_KEY secret)"
        type: boolean
        default: false
      run_sim_integration:
        description: "Also run the llm-d-inference-sim integration layer (opt-in, non-gating)"
        type: boolean
        default: false

defaults:
  run:
    working-directory: llm-d-benchmarking-agent-project

jobs:
  flow-validation:
    name: Flow validation (deterministic, hermetic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # No submodules on purpose — the flow harness is hermetic.

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (editable + dev extras)
        run: python -m pip install -e ".[dev]"

      - name: Validate flows (readable summary)
        run: python scripts/validate_flows.py --show

      - name: Full test suite (gating)
        # Flow validation + every other test. Tests that need the read-only repos skip
        # cleanly when the submodules aren't checked out.
        run: python -m pytest tests/ -v

  quality-gates:
    # Phase 14: enforce code quality on the integrated tree — ruff (lint), mypy
    # (types), and the full suite under a coverage gate. Behaviour is unchanged;
    # this job only checks the code. It is SEPARATE from (and additive to) the
    # hermetic flow-validation job above, which is kept exactly as-is.
    name: Quality gates (ruff + mypy + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (editable + dev extras → ruff, mypy, pytest-cov)
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: python -m ruff check .

      - name: Typecheck (mypy)
        run: python -m mypy app

      - name: Check out the read-only sibling repos for the covered suite
        # The coverage gate runs the FULL suite, including the tests that read the
        # real Benchmark Report schema/specs from llm-d-benchmark. Clone them next
        # to the project and point REPOS_DIR at the parent (the run step sets it).
        working-directory: ${{ github.workspace }}
        run: |
          git clone --depth 1 https://github.com/llm-d/llm-d-benchmark.git
          git clone --depth 1 https://github.com/llm-d/llm-d.git

      - name: Full suite under coverage gate
        env:
          # Parent dir holding llm-d / llm-d-benchmark, cloned in the step above.
          REPOS_DIR: ${{ github.workspace }}
        run: python -m pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=85

  live-eval:
    name: Live LLM eval (opt-in, non-gating)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_live_eval }}
    continue-on-error: true   # informational only — never blocks the build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Live eval
        env:
          # Provide whichever your provider needs via repo/org secrets.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          LLM_EVAL_LIVE: "1"
        run: python -m pytest tests/flows/test_flows_live.py -v

  sim-integration:
    # Phase 26: the proposal's explicit "integration tests with llm-d-inference-sim".
    # OPT-IN and NON-GATING — mirrors the live-eval job above: it only runs on a manual
    # dispatch (`run_sim_integration: true`) and is `continue-on-error`, so it can NEVER
    # block the build. It stands up the real llm-d-inference-sim (the CPU-only mock
    # inference server) and drives the analyze/compare path against a report produced from
    # a real mock run. The DEFAULT (gating) suite stays fully hermetic — those same tests
    # SKIP cleanly there because LLMD_SIM_INTEGRATION is unset.
    name: llm-d-inference-sim integration (opt-in, non-gating)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_sim_integration }}
    continue-on-error: true   # informational only — never blocks the build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (editable + dev extras)
        run: python -m pip install -e ".[dev]"

      - name: Check out the read-only llm-d-benchmark repo (for the BR v0.2 schema/example)
        working-directory: ${{ github.workspace }}
        run: git clone --depth 1 https://github.com/llm-d/llm-d-benchmark.git

      - name: Pull the llm-d-inference-sim image
        # The integration layer locates the sim as a pulled container image (docker is
        # preinstalled on ubuntu-latest runners). If the pull fails the tests SKIP cleanly
        # (sim_available() == False) rather than fail — this job is informational.
        run: docker pull ghcr.io/llm-d/llm-d-inference-sim:latest || true

      - name: Run the sim integration layer
        env:
          REPOS_DIR: ${{ github.workspace }}
          LLMD_SIM_INTEGRATION: "1"
          LLMD_SIM_IMAGE: ghcr.io/llm-d/llm-d-inference-sim:latest
        run: python -m pytest tests/integration/ -v
